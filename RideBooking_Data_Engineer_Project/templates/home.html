<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ride Booking Home</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 10%, rgba(79,172,254,0.35), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(0,242,254,0.25), transparent 45%),
        linear-gradient(135deg, #f6f9fc, #eef3ff);
    }

    .container {
      width: 100%;
      max-width: 620px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 16px 45px rgba(0,0,0,0.12);
      overflow: hidden;
      transform: translateY(0);
      animation: popIn 0.5s ease;
    }

    /* Brand top bar */
    .container::before {
      content: "";
      display: block;
      height: 8px;
      background: linear-gradient(90deg, #007BFF, #00d4ff);
    }

    .content {
      padding: 42px 40px 38px;
      text-align: center;
    }

    h1 {
      color: #1f2937;
      font-size: 34px;
      margin: 0 0 12px;
      letter-spacing: -0.5px;
    }

    p {
      color: #5b6472;
      font-size: 17px;
      margin: 0 0 28px;
      line-height: 1.6;
    }

    .button {
      display: inline-block;
      padding: 14px 30px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: linear-gradient(45deg, #007BFF, #0056b3);
      border-radius: 999px;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 10px 22px rgba(0,123,255,0.25);
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(0,123,255,0.35);
      opacity: 0.98;
    }

    .hint {
      margin-top: 18px;
      font-size: 13px;
      color: #8a94a6;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <h1>Welcome to the Ride Booking Service</h1>
      <p>Book your ride with us and enjoy a seamless experience!</p>
      <a href="/book" class="button">Book a Ride</a>
      <div class="hint">Fast booking • Clear confirmation • Simple experience</div>
    </div>
  </div>
</body>
</html>
