<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ride Booking Home</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 10%, rgba(40,167,69,0.25), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(79,172,254,0.22), transparent 45%),
        linear-gradient(135deg, #f6f9fc, #eef3ff);
    }

    .container {
      width: 100%;
      max-width: 620px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 16px 45px rgba(0,0,0,0.12);
      overflow: hidden;
      animation: popIn 0.5s ease;
      text-align: center;
    }

    .container::before {
      content: "";
      display: block;
      height: 8px;
      background: linear-gradient(90deg, #28a745, #007BFF);
    }

    .content {
      padding: 42px 40px 36px;
    }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(40,167,69,0.12);
      color: #28a745;
      font-size: 34px;
      margin-bottom: 14px;
    }

    h1 {
      color: #1f2937;
      font-size: 32px;
      margin: 0 0 10px;
      letter-spacing: -0.4px;
    }

    p {
      color: #5b6472;
      font-size: 17px;
      margin: 0 0 26px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .button {
      display: inline-block;
      padding: 13px 26px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 999px;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .primary {
      color: white;
      background: linear-gradient(45deg, #28a745, #1f8a39);
      box-shadow: 0 10px 22px rgba(40,167,69,0.25);
    }

    .primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(40,167,69,0.35);
      opacity: 0.98;
    }

    .secondary {
      color: #1f2937;
      background: #f1f5f9;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    }

    .secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(0,0,0,0.12);
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="content">
      <div class="icon">✓</div>
      <h1>Ride Confirmed</h1>
      <p>Your ride has been successfully booked. Thank you for choosing our service!</p>

      <div class="actions">
        <a href="/" class="button secondary">Back to Home</a>
      </div>
    </div>
  </div>
</body>
</html>
